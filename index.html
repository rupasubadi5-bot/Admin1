<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SRT SUPREME CONTROL PRO V2</title>
    <style>
        #header-wrapper, .sidebar-wrapper, .footer-wrapper, .post-footer, #comments, .post-share-buttons, .blog-pager, .header, .date-header, .tabs-outer, .main-inner { display: none !important; }
        :root { --neon-blue: #00f0ff; --pure-black: #000000; --card-bg: #0a0a0a; --neon-pink: #ff00f0; --neon-green: #12fd01; }
        body { margin: 0; padding: 0; background: var(--pure-black) !important; font-family: 'Segoe UI', sans-serif; overflow: hidden; color: white; }
        @media screen and (min-width: 1024px) {
            body::before { content: "ACCESS DENIED: MOBILE ONLY SYSTEM"; position: fixed; inset: 0; background: black; color: red; z-index: 99999999; display: flex; justify-content: center; align-items: center; font-size: 20px; font-weight: bold; }
            .supreme-overlay { display: none !important; }
        }
        #login-screen { position: fixed; inset: 0; background: #000; z-index: 10000000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .login-box { width: 85%; max-width: 320px; padding: 25px; border: 2px solid var(--neon-blue); border-radius: 20px; }
        .login-input { width: 100%; background: #111; border: 1px solid #333; color: #fff; padding: 12px; margin: 10px 0; border-radius: 8px; box-sizing: border-box; outline: none; }
        .supreme-overlay { position: fixed; inset: 0; background: var(--pure-black); z-index: 999999; display: none; flex-direction: column; border: 4px solid var(--neon-blue); box-sizing: border-box; }
        .header-nav { padding: 15px; background: #000; border-bottom: 1px solid #1a1a1a; display: flex; justify-content: space-between; align-items: center; }
        .sidebar { position: fixed; top: 0; left: -100%; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 10000001; transition: 0.4s; padding: 25px; box-sizing: border-box; }
        .sidebar.active { left: 0; }
        .admin-card { background: var(--card-bg); border: 1px solid #222; border-left: 4px solid var(--neon-blue); border-radius: 12px; padding: 15px; margin: 15px 10px; }
        .history-card { background: #111; border: 1px solid #333; border-radius: 10px; padding: 12px; margin-bottom: 10px; font-size: 13px; }
        .btn { padding: 10px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 11px; }
        .btn-approve { background: var(--neon-green); color: #000; flex: 1; margin-right: 5px; }
        .btn-reject { background: #333; color: #fff; flex: 1; }
        .btn-resend { background: var(--neon-blue); color: #000; width: 100%; margin-top: 8px; }
        .content-area { flex: 1; overflow-y: auto; }
        .menu-icon { font-size: 28px; color: var(--neon-blue); cursor: pointer; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <h2 style="color: var(--neon-blue); text-align: center; margin-top: 0;">ADMIN ACCESS</h2>
        <input type="text" id="user" class="login-input" placeholder="USER ID">
        <input type="password" id="pass" class="login-input" placeholder="PASSWORD">
        <input type="password" id="vcode" class="login-input" placeholder="VERIFICATION PIN">
        <button onclick="checkLogin()" style="width: 100%; background: var(--neon-blue); border: none; padding: 14px; font-weight: bold; margin-top: 15px; border-radius: 8px;">UNSEAL SYSTEM</button>
    </div>
</div>

<div class="supreme-overlay" id="main-dash">
    <div class="sidebar" id="sidebar">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2 style="color: var(--neon-blue); margin: 0;">LOG HISTORY</h2>
            <div onclick="toggleMenu()" style="font-size: 30px; color: red;">&times;</div>
        </div>
        <p id="acc-count" style="color: #666; font-size: 11px; margin-bottom: 20px;">SYSTEM CONNECTED</p>
        <div id="history-list" style="height: 70vh; overflow-y: auto;"></div>
        <button onclick="confirmClear()" style="width: 100%; background: #440000; color: white; border: 1px solid red; padding: 12px; margin-top: 10px; border-radius: 8px;">CLEAR ALL HISTORY</button>
    </div>

    <div class="header-nav">
        <div class="menu-icon" onclick="toggleMenu()">☰</div>
        <div style="text-align: center;">
            <div style="color: var(--neon-blue); font-weight: 900;">SRT SUPREME</div>
            <div style="font-size: 9px; color: var(--neon-pink);">LIVE ADMIN TERMINAL</div>
        </div>
        <div style="width: 10px; height: 10px; background: var(--neon-green); border-radius: 50%;"></div>
    </div>

    <div class="content-area">
        <h4 style="text-align: center; color: #444; letter-spacing: 2px;">Incoming Approvals</h4>
        <div id="live-data"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, updateDoc, getCountFromServer } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAjJpK-3eNIXFM7V7dWLJhWua5T3fF3_2E",
        authDomain: "user-store-srt.firebaseapp.com",
        projectId: "user-store-srt",
        storageBucket: "user-store-srt.firebasestorage.app",
        messagingSenderId: "932714544224",
        appId: "1:932714544224:web:7ecaecb707b59b3b7d1705"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.checkLogin = () => {
        if(document.getElementById('user').value === "SAMRAT" && document.getElementById('pass').value === "999999" && document.getElementById('vcode').value === "000000") {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-dash').style.display = 'flex';
            loadHistory();
            fetchTotalAccounts();
        } else { alert("ACCESS DENIED"); }
    }

    async function fetchTotalAccounts() {
        try {
            const snapshot = await getCountFromServer(collection(db, "users"));
            document.getElementById('acc-count').innerText = "TOTAL USERS: " + snapshot.data().count;
        } catch(e) { console.error(e); }
    }

    onSnapshot(collection(db, "users"), (snapshot) => {
        const list = document.getElementById("live-data");
        list.innerHTML = "";
        let count = 0;

        snapshot.forEach((uDoc) => {
            const u = uDoc.data();
            if (u.requestStatus === "Approval Pending") {
                count++;
                list.innerHTML += `
                    <div class="admin-card">
                        <div style="color: #aaa; font-size: 14px;"><b>NAME:</b> <span style="color: #fff;">${u.userName || 'N/A'}</span></div>
                        <div style="color: #ff00f0; font-size: 14px;"><b>ITEM:</b> ${u.item || 'N/A'}</div>
                        <div style="color: #25d366; font-size: 14px;"><b>WHATSAPP:</b> ${u.whatsapp || 'N/A'}</div>
                        <div style="color: #00f0ff; font-size: 14px; margin-top: 5px;"><b>TIME:</b> ${u.time || 'No Time'}</div>

                        <input type="text" id="msg-${uDoc.id}" class="login-input" placeholder="Message to user..." style="margin: 10px 0; font-size: 12px;">
                        
                        <div style="display: flex; gap: 10px;">
                            <button class="btn-approve" onclick="manage('${uDoc.id}', 'Approved', '${u.userName || 'N/A'}', '${u.item || 'N/A'}', '${u.whatsapp || 'N/A'}')">APPROVE</button>
                            <button class="btn-reject" onclick="manage('${uDoc.id}', 'Rejected', '${u.userName || 'N/A'}', '${u.item || 'N/A'}', '${u.whatsapp || 'N/A'}')">REJECT</button>
                        </div>
                    </div>`;
            }
        });
        if (count === 0) list.innerHTML = "<p style='text-align:center; color:#444; margin-top:50px;'>NO ACTIVE REQUESTS</p>";
    });

    window.manage = async (docId, status, userName, item, whatsapp, customMsg = null) => {
        const msgInput = document.getElementById(`msg-${docId}`);
        const msg = customMsg || (msgInput ? msgInput.value : "") || "Status Updated";
        
        try {
            await updateDoc(doc(db, "users", docId), {
                requestStatus: status,
                adminMessage: msg,
                processedAt: new Date().toLocaleString()
            });

            let logs = JSON.parse(localStorage.getItem('srt_logs') || '[]');
            logs.unshift({ docId, userName, item, whatsapp, status, msg, time: new Date().toLocaleString() });
            localStorage.setItem('srt_logs', JSON.stringify(logs));
            
            loadHistory();
            if(!customMsg) alert("SIGNAL SENT: " + status);
        } catch(e) { alert("ERROR: " + e.message); }
    };

    window.toggleMenu = () => {
        document.getElementById('sidebar').classList.toggle('active');
        loadHistory();
    };

    window.loadHistory = () => {
        const hList = document.getElementById('history-list');
        const logs = JSON.parse(localStorage.getItem('srt_logs') || '[]');
        hList.innerHTML = logs.length ? "" : "<p style='color:#333; text-align:center;'>Empty Logs</p>";
        
        logs.forEach((log, index) => {
            const statusColor = log.status === 'Approved' ? 'var(--neon-green)' : 'red';
            hList.innerHTML += `
                <div class="history-card">
                    <div style="display:flex; justify-content:space-between;">
                        <b>${log.userName}</b>
                        <span style="color:${statusColor}; font-size:10px;">${log.status}</span>
                    </div>
                    <div style="font-size:11px; color:#888;">Item: ${log.item}</div>
                    <div style="font-size:11px; color:var(--neon-green);">WhatsApp: ${log.whatsapp || 'N/A'}</div>
                    <div style="font-size:11px; color:#555; margin-bottom:5px;">Time: ${log.time}</div>
                    <input type="text" id="msg-hist-${index}" class="login-input" style="padding:5px; font-size:11px;" value="${log.msg}">
                    <button class="btn btn-resend" onclick="reSend('${log.docId}', ${index}, '${log.userName}', '${log.item}', '${log.whatsapp}')">EDIT & RE-SEND SIGNAL</button>
                </div>
            `;
        });
    };

    window.reSend = async (docId, index, name, item, whatsapp) => {
        const newMsg = document.getElementById(`msg-hist-${index}`).value;
        const newStatus = confirm("Change status to APPROVED?\n(Cancel for keeping same)") ? "Approved" : "Rejected";
        await window.manage(docId, newStatus, name, item, whatsapp, newMsg);
        alert("HISTORY UPDATED & RE-SENT!");
    };

    window.confirmClear = () => {
        if(confirm("⚠ WARNING: CAN YOU REALLY CLEAN HISTORY?")) {
            localStorage.removeItem('srt_logs');
            loadHistory();
        }
    };

    // Mobile Check Logic
    (function ultimateBlock() {
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        if (!isMobile) {
            document.body.innerHTML = `<div style="height:100vh; background:black; color:red; display:flex; justify-content:center; align-items:center; text-align:center; font-family:sans-serif;"><h1>🚨 ACCESS DENIED: MOBILE ONLY 🚨</h1></div>`;
        }
    })();
</script>
</body>
</html>
